# PyAgenity Development Docker Compose
# This is a simplified version for development and testing

version: '3.8'

services:
  # PyAgenity API Server (development mode)
  pyagenity-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Development configuration
      PYAGENTIC_CONFIG: /app/examples/react/pyagentic.json
      SECRET_KEY: dev-secret-key-not-for-production
      
      # LLM API keys (set in .env file)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      # Mount source code for development
      - .:/app
      - ./.env:/app/.env:ro
    command: >
      sh -c "pip install -e . &&
             python -m uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
